services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://motto:motto@postgres:5432/motto_ocha
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: motto
      POSTGRES_PASSWORD: motto
      POSTGRES_DB: motto_ocha
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U motto -d motto_ocha"]
      interval: 3s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
